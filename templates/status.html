<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Status - Ford Recall Checker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 700px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .card { background: #fff; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .progress-bar-bg { background: #e5e7eb; border-radius: 999px; height: 24px; overflow: hidden; margin: 16px 0; }
        .progress-bar-fill { background: #0068d6; height: 100%; border-radius: 999px; transition: width 0.5s ease; min-width: 0; }
        .status-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
        .detail-text { color: #666; font-size: 0.9rem; margin-bottom: 16px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 20px; }
        .stat { background: #f9fafb; border-radius: 6px; padding: 14px; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #0068d6; }
        .stat-label { font-size: 0.8rem; color: #888; margin-top: 2px; }
        .btn { display: inline-block; background: #0068d6; color: #fff; border: none; padding: 12px 32px; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 600; text-decoration: none; margin-top: 20px; }
        .btn:hover { background: #0050a8; }
        .btn-secondary { background: #6b7280; margin-left: 10px; }
        .btn-secondary:hover { background: #4b5563; }
        .error-box { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; padding: 16px; border-radius: 6px; margin-top: 16px; }
        .complete-box { background: #f0fdf4; border: 1px solid #86efac; color: #166534; padding: 16px; border-radius: 6px; margin-top: 16px; }
        .vin-current { font-family: monospace; background: #f3f4f6; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ford Recall Checker</h1>
        <p class="subtitle">Job <code>{{ job_id }}</code></p>

        <div class="card">
            <div id="statusArea">
                <p class="status-text" id="statusText">Starting...</p>
                <p class="detail-text" id="detailText">Initializing headless browser...</p>

                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
                </div>
                <p class="detail-text" id="progressLabel">0 / {{ job.vin_count }} VINs</p>
            </div>

            <div class="stats" id="statsArea">
                <div class="stat">
                    <div class="stat-value" id="statProcessed">0</div>
                    <div class="stat-label">Processed</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statRecalls">0</div>
                    <div class="stat-label">With Recalls</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statClean">0</div>
                    <div class="stat-label">No Recalls</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statErrors">0</div>
                    <div class="stat-label">Errors</div>
                </div>
            </div>

            <div id="resultArea" style="display:none;"></div>

            <div id="buttonArea" style="margin-top: 20px;">
                <a href="/" class="btn btn-secondary">Back</a>
            </div>
        </div>
    </div>

    <script>
        var jobId = "{{ job_id }}";
        var totalVins = {{ job.vin_count }};
        var polling = null;

        function updateUI(data) {
            var progress = data.progress || {};
            var current = progress.current || 0;
            var pct = totalVins > 0 ? Math.round((current / totalVins) * 100) : 0;

            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressLabel').textContent = current + ' / ' + totalVins + ' VINs (' + pct + '%)';

            document.getElementById('statProcessed').textContent = current;
            document.getElementById('statRecalls').textContent = progress.with_recalls || 0;
            document.getElementById('statClean').textContent = progress.no_recalls || 0;
            document.getElementById('statErrors').textContent = progress.errors || 0;

            if (data.status === 'running' || data.status === 'starting') {
                var vin = progress.vin || '';
                document.getElementById('statusText').textContent = 'Processing...';
                if (vin) {
                    document.getElementById('detailText').innerHTML = 'Checking VIN: <span class="vin-current">' + vin + '</span>';
                }
            } else if (data.status === 'complete') {
                document.getElementById('statusText').textContent = 'Complete!';
                document.getElementById('detailText').textContent = '';
                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('progressBar').style.background = '#22c55e';

                var result = data.result || {};
                var emailMsg = '';
                if (data.email_sent === true) {
                    emailMsg = '<p style="margin-top:10px;">&#9993; Results emailed to <strong>' + data.email + '</strong></p>';
                } else if (data.email_sent === false) {
                    emailMsg = '<p style="margin-top:10px; color:#b91c1c;">Failed to send email. Please download the file instead.</p>';
                }
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('resultArea').innerHTML =
                    '<div class="complete-box">' +
                    '<strong>Done!</strong> ' + (result.with_recalls || 0) + ' vehicle(s) with recalls found out of ' + (result.processed || 0) + ' checked.' +
                    emailMsg +
                    '</div>';

                document.getElementById('buttonArea').innerHTML =
                    '<a href="/download/' + jobId + '" class="btn">Download Excel</a>' +
                    '<a href="/" class="btn btn-secondary">New Check</a>';

                clearInterval(polling);
            } else if (data.status === 'error') {
                document.getElementById('statusText').textContent = 'Error';
                document.getElementById('detailText').textContent = '';
                document.getElementById('progressBar').style.background = '#ef4444';

                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('resultArea').innerHTML =
                    '<div class="error-box">' +
                    '<strong>Error:</strong> ' + (data.error || 'Unknown error') +
                    '</div>';

                clearInterval(polling);
            }
        }

        function poll() {
            fetch('/status/' + jobId)
                .then(function(r) { return r.json(); })
                .then(updateUI)
                .catch(function() {});
        }

        poll();
        polling = setInterval(poll, 3000);
    </script>
</body>
</html>
